<div class="app-card p-3 p-md-4">
<h3>{{ id ? 'Edit Request' : 'Create Request' }}</h3>

<div *ngIf="isOverdueLocked" class="alert alert-warning mb-3">
  This request is overdue and cannot be edited.
</div>

<form [formGroup]="form" (ngSubmit)="save()">
  <div class="mb-3">
    <label class="form-label">Title</label>
    <input class="form-control" formControlName="title" />
  </div>
  <div class="mb-3">
    <label class="form-label">Description</label>
    <textarea class="form-control" rows="4" formControlName="description"></textarea>
  </div>
  <div class="row">
    <div class="col-md-4 mb-3">
      <label class="form-label">Priority</label>
      <select class="form-select" formControlName="priority">
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
      </select>
    </div>
    <div class="col-md-4 mb-3">
      <label class="form-label">Status</label>
      <select class="form-select" formControlName="status" [disabled]="!isManager">
        <option *ngFor="let status of statusOptions" [value]="status">{{ status }}</option>
      </select>
    </div>
    <div class="col-md-4 mb-3">
      <label class="form-label">Deadline Date</label>
      <input class="form-control" type="date" formControlName="deadline" />
    </div>
  </div>

  <a routerLink="/requests" class="btn btn-outline-secondary me-2">Back to list</a>
  <button type="submit" class="btn btn-primary me-2" [disabled]="loading || form.invalid || isOverdueLocked">
    {{ loading ? 'Saving...' : 'Save' }}
  </button>

  <ng-container *ngIf="id && isManager">
    <button *ngIf="!isOverdueLocked" type="button" class="btn btn-success me-2" (click)="setStatus('Done')">Mark Done</button>
    <button *ngIf="canCancelFromCurrentStatus" type="button" class="btn btn-outline-secondary me-2" (click)="setStatus('Cancelled')">Cancel</button>
    <button type="button" class="btn btn-outline-danger" [disabled]="loading" (click)="deleteRequest()">Delete</button>
  </ng-container>
</form>
</div>
