<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="app-card p-3 p-md-4">
    <h3>Login</h3>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input
          class="form-control"
          formControlName="email"
          type="email"
          autocomplete="email"
          [class.is-invalid]="form.controls.email.touched && form.controls.email.invalid"
        />
        <div class="invalid-feedback d-block" *ngIf="form.controls.email.touched && form.controls.email.errors?.['required']">
          Email is required.
        </div>
        <div class="invalid-feedback d-block" *ngIf="form.controls.email.touched && form.controls.email.errors?.['email']">
          Enter a valid email address.
        </div>
        <div class="invalid-feedback d-block" *ngIf="form.controls.email.touched && form.controls.email.errors?.['maxlength']">
          Email must be at most 256 characters.
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input
          class="form-control"
          formControlName="password"
          type="password"
          autocomplete="current-password"
          [class.is-invalid]="form.controls.password.touched && form.controls.password.invalid"
        />
        <div class="invalid-feedback d-block" *ngIf="form.controls.password.touched && form.controls.password.errors?.['required']">
          Password is required.
        </div>
        <div class="invalid-feedback d-block" *ngIf="form.controls.password.touched && form.controls.password.errors?.['minlength']">
          Password must be at least 6 characters.
        </div>
      </div>
      <button class="btn btn-primary" type="submit" [disabled]="loading">
        {{ loading ? 'Loading...' : 'Login' }}
      </button>
    </form>
    </div>
  </div>
</div>
